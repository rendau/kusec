syntax = "proto3";

package kusec_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "/kusec_v1";

// Выгрузка всего дерева app → secret → item без значений item-ов
// (безопасно отдавать внешним инструментам, например ИИ-агенту для анализа).
service Transfer {
  rpc Tree(google.protobuf.Empty) returns (TransferTreeRep) {
    option (google.api.http) = {
      get: "/transfer/tree"
    };
  }
}

// ── Tree (export без значений) ──────────────────────────

message TransferTreeRep {
  repeated TransferTreeAppSt apps = 1;
}

message TransferTreeAppSt {
  string id = 1;
  string namespace = 2;
  string name = 3;
  string slug_name = 4;
  string description = 5;
  bool active = 6;
  google.protobuf.Timestamp updated_at = 7;
  repeated TransferTreeSecretSt secrets = 8;
  repeated TransferTreeConfigMapSt configmaps = 9;
}

message TransferTreeConfigMapSt {
  string id = 1;
  string slug_name = 2;
  string description = 3;
  bool active = 4;
  google.protobuf.Timestamp updated_at = 5;
  repeated TransferTreeConfigItemSt items = 6;
}

message TransferTreeConfigItemSt {
  string id = 1;
  string key = 2;
  string value_format = 3;
  string encoding = 4;
  string file_name = 5;
  string content_type = 6;
  string description = 7;
  bool active = 8;
  google.protobuf.Timestamp updated_at = 9;
  // Размер хранимого значения в байтах; само значение не отдаётся.
  int64 value_size = 10;
}

message TransferTreeSecretSt {
  string id = 1;
  string slug_name = 2;
  string description = 3;
  bool active = 4;
  google.protobuf.Timestamp updated_at = 5;
  repeated TransferTreeItemSt items = 6;
  // Тип k8s-секрета (пусто = Opaque).
  string kube_type = 7;
}

message TransferTreeItemSt {
  string id = 1;
  string key = 2;
  string value_format = 3;
  string encoding = 4;
  string file_name = 5;
  string content_type = 6;
  string description = 7;
  bool active = 8;
  google.protobuf.Timestamp updated_at = 9;
  // Размер хранимого значения в байтах; само значение не отдаётся.
  int64 value_size = 10;
}
