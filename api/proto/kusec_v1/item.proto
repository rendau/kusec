syntax = "proto3";

package kusec_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "/kusec_v1";

service Item {
  rpc List(ItemListReq) returns (ItemListRep) {
    option (google.api.http) = {
      get: "/item"
    };
  }

  rpc Get(ItemGetReq) returns (ItemMain) {
    option (google.api.http) = {
      get: "/item/{id}"
    };
  }

  rpc Create(ItemCreateReq) returns (ItemCreateRep) {
    option (google.api.http) = {
      post: "/item"
      body: "*"
    };
  }

  rpc Update(ItemUpdateReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/item/{id}"
      body: "*"
    };
  }

  rpc Delete(ItemGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/item/{id}"
    };
  }
}

// ── Messages ────────────────────────────────────────────

message ItemMain {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  string secret_id = 4;
  bool active = 5;
  string key = 6;
  string value = 7;
  string value_format = 9;
  string description = 8;
}

// List

message ItemListReq {
  common.ListParamsSt list_params = 1;
  optional string secret_id = 2;
  optional bool active = 3;
  optional string search = 4;
}

message ItemListRep {
  common.PaginationInfoSt pagination_info = 1;
  repeated ItemMain results = 2;
}

// Get

message ItemGetReq {
  string id = 1;
}

// Create

message ItemCreateReq {
  string secret_id = 1;
  optional bool active = 2;
  string key = 3;
  string value = 4;
  optional string value_format = 6;
  string description = 5;
}

message ItemCreateRep {
  string id = 1;
}

// Update

message ItemUpdateReq {
  string id = 1;
  optional string secret_id = 2;
  optional bool active = 3;
  optional string key = 4;
  optional string value = 5;
  optional string value_format = 7;
  optional string description = 6;
}
