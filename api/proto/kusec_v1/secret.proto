syntax = "proto3";

package kusec_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "kusec_v1/common.proto";

option go_package = "/kusec_v1";

service Secret {
  rpc List(SecretListReq) returns (SecretListRep) {
    option (google.api.http) = {
      get: "/secret"
    };
  }

  rpc Get(SecretGetReq) returns (SecretMain) {
    option (google.api.http) = {
      get: "/secret/{id}"
    };
  }

  rpc Create(SecretCreateReq) returns (SecretCreateRep) {
    option (google.api.http) = {
      post: "/secret"
      body: "*"
    };
  }

  rpc Update(SecretUpdateReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/secret/{id}"
      body: "*"
    };
  }

  rpc Delete(SecretGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/secret/{id}"
    };
  }
}

// ── Messages ────────────────────────────────────────────

message SecretMain {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  string app_id = 4;
  bool active = 5;
  string slug_name = 6;
  string description = 7;
  // Полное имя итогового k8s-секрета; вычисляется бэкендом.
  string kube_secret_name = 8;
  // Тип k8s-секрета (пусто = Opaque), например kubernetes.io/basic-auth.
  string kube_type = 9;
  // При true имя k8s-секрета = slug_name без префикса и app-slug.
  // Менять флаг могут только админы.
  bool exact_slug = 10;
}

// List

message SecretListReq {
  ListParamsSt list_params = 1;
  optional string app_id = 2;
  optional bool active = 3;
  optional string search = 4;
}

message SecretListRep {
  PaginationInfoSt pagination_info = 1;
  repeated SecretMain results = 2;
}

// Get

message SecretGetReq {
  string id = 1;
}

// Create

message SecretCreateReq {
  string app_id = 1;
  optional bool active = 2;
  string slug_name = 3;
  string description = 4;
  // Тип k8s-секрета (пусто = Opaque).
  string kube_type = 5;
  // Имя без префикса и app-slug. Установка true доступна только админам.
  bool exact_slug = 6;
}

message SecretCreateRep {
  string id = 1;
}

// Update

message SecretUpdateReq {
  string id = 1;
  optional string app_id = 2;
  optional bool active = 3;
  optional string slug_name = 4;
  optional string description = 5;
  optional string kube_type = 6;
  // Изменение флага доступно только админам.
  optional bool exact_slug = 7;
}
