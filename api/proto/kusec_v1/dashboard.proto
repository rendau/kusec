syntax = "proto3";

package kusec_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "/kusec_v1";

// Сводка для главной страницы админки: счётчики сущностей и последние
// обновлённые секреты — одной ручкой вместо россыпи list-запросов.
service Dashboard {
  rpc Get(google.protobuf.Empty) returns (DashboardRep) {
    option (google.api.http) = {
      get: "/dashboard"
    };
  }
}

// ── Messages ────────────────────────────────────────────

message DashboardCountSt {
  int64 total = 1;
  int64 active = 2;
}

message DashboardRecentSecretSt {
  string id = 1;
  string app_id = 2;
  // Имя приложения, к которому относится секрет (для отображения).
  string app_name = 3;
  string slug_name = 4;
  string description = 5;
  bool active = 6;
  google.protobuf.Timestamp updated_at = 7;
  // Количество items в секрете.
  int64 item_count = 8;
}

message DashboardRep {
  DashboardCountSt app = 1;
  DashboardCountSt secret = 2;
  DashboardCountSt item = 3;
  DashboardCountSt usr = 4;
  repeated DashboardRecentSecretSt recent_secrets = 5;
}
