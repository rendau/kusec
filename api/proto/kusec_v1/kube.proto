syntax = "proto3";

package kusec_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "/kusec_v1";

// Синхронизация секретов из базы в Kubernetes (только изнутри кластера).
// Имя k8s-секрета: {KUBE_SECRET_NAME_PREFIX}{app.slug_name}-{secret.slug_name}
// (префикс из env, по умолчанию "kusec-"), namespace — из app.
// Управляемые секреты помечаются лейблом app.kubernetes.io/managed-by=kusec;
// удаляются только они.
service Kube {
  rpc SyncSecrets(KubeSyncSecretsReq) returns (KubeSyncSecretsRep) {
    option (google.api.http) = {
      post: "/kube/sync-secret"
      body: "*"
    };
  }

  // Синхронизация configmap-ов из базы в Kubernetes (только изнутри кластера).
  // Имя k8s-configmap: {KUBE_SECRET_NAME_PREFIX}{app.slug_name}-{configmap.slug_name}.
  // Управляемые configmap-ы помечаются лейблом app.kubernetes.io/managed-by=kusec.
  rpc SyncConfigMaps(KubeSyncConfigMapsReq) returns (KubeSyncConfigMapsRep) {
    option (google.api.http) = {
      post: "/kube/sync-configmap"
      body: "*"
    };
  }

  // Общая синхронизация: и секреты, и configmap-ы за один вызов под единой
  // блокировкой (только изнутри кластера).
  rpc Sync(KubeSyncReq) returns (KubeSyncRep) {
    option (google.api.http) = {
      post: "/kube/sync"
      body: "*"
    };
  }

  rpc ListNamespaces(google.protobuf.Empty) returns (KubeListNamespacesRep) {
    option (google.api.http) = {
      get: "/kube/namespace"
    };
  }

  // Список секретов кластера для выбора при импорте (только админ).
  // namespace в query пуст — берутся все namespace-ы без системных kube-*.
  rpc ListClusterSecrets(KubeListClusterSecretsReq) returns (KubeListClusterSecretsRep) {
    option (google.api.http) = {
      get: "/kube/cluster-secret"
    };
  }

  // Импорт одного секрета кластера в указанное приложение (только админ).
  // Секрет кластера становится записью secret в app_id с item-ами по ключам
  // data. Имя посадочного секрета (slug) обязательно. Если секрет с таким slug
  // в приложении уже есть — выполняется дозаполнение: недостающие ключи
  // создаются, совпавшие — перезаписываются значением из кластера. Источник в
  // кластере не меняется.
  rpc ImportSecret(KubeImportSecretReq) returns (KubeImportSecretRep) {
    option (google.api.http) = {
      post: "/kube/import-secret"
      body: "*"
    };
  }

  // Живой k8s-secret из кластера для сверки с записью kusec. Доступ — только
  // по своим app (HasAppAccess на app секрета), не только админ. Значения
  // отдаются (текст или base64 для бинарных), namespace/имя/тип/managed — для
  // контекста.
  rpc GetClusterSecret(KubeGetClusterSecretReq) returns (KubeClusterResourceRep) {
    option (google.api.http) = {
      get: "/kube/secret/{secret_id}/cluster"
    };
  }

  // Живой k8s-configmap из кластера для сверки. Доступ — только по своим app.
  rpc GetClusterConfigMap(KubeGetClusterConfigMapReq) returns (KubeClusterResourceRep) {
    option (google.api.http) = {
      get: "/kube/configmap/{configmap_id}/cluster"
    };
  }
}

// ── Messages ────────────────────────────────────────────

message KubeListNamespacesRep {
  // false — сервис запущен вне кластера (namespaces тогда пуст).
  bool in_cluster = 1;
  // Имена namespace-ов кластера без системных kube-*.
  repeated string namespaces = 2;
}

message KubeListClusterSecretsReq {
  // Namespace для выборки; пусто — все namespace-ы без системных kube-*.
  string namespace = 1;
}

message KubeClusterSecretSt {
  string namespace = 1;
  string name = 2;
  // Тип k8s-секрета (пусто = Opaque).
  string type = 3;
  // Ключи data (отсортированы), значения не передаются.
  repeated string keys = 4;
  // true — секрет уже под управлением kusec (лейбл managed-by=kusec).
  bool managed = 5;
}

message KubeListClusterSecretsRep {
  // false — сервис запущен вне кластера (secrets тогда пуст).
  bool in_cluster = 1;
  repeated KubeClusterSecretSt secrets = 2;
}

message KubeImportSecretReq {
  // Целевое приложение, в которое импортируется секрет.
  string app_id = 1;
  // Секрет-источник в кластере.
  string namespace = 2;
  string name = 3;
  // Имя посадочного секрета kusec (slug). Обязательно.
  string secret_slug = 4;
}

message KubeImportSecretRep {
  // Запись secret (созданная или дозаполненная).
  string secret_id = 1;
  // Фактический slug посадочного секрета.
  string secret_slug = 2;
  // false — секрет уже существовал, выполнено дозаполнение.
  bool secret_created = 3;
  // Сколько item-ов создано (новые ключи).
  int64 created_items = 4;
  // Сколько item-ов обновлено (совпавшие ключи — значение перезаписано).
  int64 updated_items = 5;
}

message KubeSyncSecretsReq {
  string app_id = 1;
}

message KubeSyncSecretsRep {
  // Списки в формате "namespace/name".
  repeated string created = 1;
  repeated string updated = 2;
  repeated string deleted = 3;
  int64 unchanged = 4;
  // Ошибки по отдельным секретам (sync продолжается для остальных).
  repeated string errors = 5;
}

message KubeSyncConfigMapsReq {
  string app_id = 1;
}

message KubeSyncConfigMapsRep {
  // Списки в формате "namespace/name".
  repeated string created = 1;
  repeated string updated = 2;
  repeated string deleted = 3;
  int64 unchanged = 4;
  // Ошибки по отдельным configmap-ам (sync продолжается для остальных).
  repeated string errors = 5;
}

// Запрос живого k8s-secret из кластера по id записи kusec.
message KubeGetClusterSecretReq {
  string secret_id = 1;
}

// Запрос живого k8s-configmap из кластера по id записи kusec.
message KubeGetClusterConfigMapReq {
  string configmap_id = 1;
}

message KubeClusterResourceItemSt {
  string key = 1;
  // Значение из кластера: текст (encoding=plain) или base64 для бинарных
  // (encoding=base64).
  string value = 2;
  string encoding = 3;
}

// Живой k8s-объект (secret или configmap) из кластера.
message KubeClusterResourceRep {
  // false — сервис запущен вне кластера (остальные поля пусты).
  bool in_cluster = 1;
  // false — объект в кластере не найден (ещё не синхронизирован).
  bool found = 2;
  string namespace = 3;
  string name = 4;
  // Тип k8s-секрета (для secret; пусто для configmap и для Opaque).
  string type = 5;
  // true — объект под управлением kusec (лейбл managed-by=kusec).
  bool managed = 6;
  // Ключи data (отсортированы) со значениями.
  repeated KubeClusterResourceItemSt items = 7;
}

message KubeSyncReq {
  string app_id = 1;
}

message KubeSyncRep {
  // Результат синхронизации секретов.
  KubeSyncSecretsRep secrets = 1;
  // Результат синхронизации configmap-ов.
  KubeSyncConfigMapsRep configmaps = 2;
}
