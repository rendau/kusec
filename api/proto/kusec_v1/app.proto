syntax = "proto3";

package kusec_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "/kusec_v1";

service App {
  rpc List(AppListReq) returns (AppListRep) {
    option (google.api.http) = {
      get: "/app"
    };
  }

  rpc Get(AppGetReq) returns (AppMain) {
    option (google.api.http) = {
      get: "/app/{id}"
    };
  }

  rpc Create(AppCreateReq) returns (AppCreateRep) {
    option (google.api.http) = {
      post: "/app"
      body: "*"
    };
  }

  rpc Update(AppUpdateReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/app/{id}"
      body: "*"
    };
  }

  rpc Delete(AppGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/app/{id}"
    };
  }
}

// ── Messages ────────────────────────────────────────────

message AppMain {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  bool active = 4;
  string namespace = 5;
  string name = 6;
  string description = 7;
}

// List

message AppListReq {
  common.ListParamsSt list_params = 1;
  optional bool active = 2;
  optional string namespace = 3;
  optional string search = 4;
}

message AppListRep {
  common.PaginationInfoSt pagination_info = 1;
  repeated AppMain results = 2;
}

// Get

message AppGetReq {
  string id = 1;
}

// Create

message AppCreateReq {
  optional bool active = 1;
  string namespace = 2;
  string name = 3;
  string description = 4;
}

message AppCreateRep {
  string id = 1;
}

// Update

message AppUpdateReq {
  string id = 1;
  optional bool active = 2;
  optional string namespace = 3;
  optional string name = 4;
  optional string description = 5;
}
