syntax = "proto3";

package kusec_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "/kusec_v1";

service ConfigMap {
  rpc List(ConfigMapListReq) returns (ConfigMapListRep) {
    option (google.api.http) = {
      get: "/configmap"
    };
  }

  rpc Get(ConfigMapGetReq) returns (ConfigMapMain) {
    option (google.api.http) = {
      get: "/configmap/{id}"
    };
  }

  rpc Create(ConfigMapCreateReq) returns (ConfigMapCreateRep) {
    option (google.api.http) = {
      post: "/configmap"
      body: "*"
    };
  }

  rpc Update(ConfigMapUpdateReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/configmap/{id}"
      body: "*"
    };
  }

  rpc Delete(ConfigMapGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/configmap/{id}"
    };
  }
}

// ── Messages ────────────────────────────────────────────

message ConfigMapMain {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  string app_id = 4;
  bool active = 5;
  string slug_name = 6;
  string description = 7;
  // Полное имя итогового k8s-configmap; вычисляется бэкендом.
  string kube_configmap_name = 8;
  // При true имя k8s-configmap = slug_name без префикса и app-slug.
  // Менять флаг могут только админы.
  bool exact_slug = 9;
}

// List

message ConfigMapListReq {
  common.ListParamsSt list_params = 1;
  optional string app_id = 2;
  optional bool active = 3;
  optional string search = 4;
}

message ConfigMapListRep {
  common.PaginationInfoSt pagination_info = 1;
  repeated ConfigMapMain results = 2;
}

// Get

message ConfigMapGetReq {
  string id = 1;
}

// Create

message ConfigMapCreateReq {
  string app_id = 1;
  optional bool active = 2;
  string slug_name = 3;
  string description = 4;
  // Имя без префикса и app-slug. Установка true доступна только админам.
  bool exact_slug = 5;
}

message ConfigMapCreateRep {
  string id = 1;
}

// Update

message ConfigMapUpdateReq {
  string id = 1;
  optional string app_id = 2;
  optional bool active = 3;
  optional string slug_name = 4;
  optional string description = 5;
  // Изменение флага доступно только админам.
  optional bool exact_slug = 6;
}
